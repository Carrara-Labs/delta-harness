name: Release

on:
  push:
    tags: ["v*"]

# Least privilege at the workflow level; each job widens only what it needs.
permissions:
  contents: read

jobs:
  # Gate: a directly-tagged commit must pass the same checks as a PR, and the tag
  # must match package.json's version, before anything is built or published.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - name: Tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package=$PKG"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

  binaries:
    needs: verify
    permissions:
      contents: write # upload assets to the GitHub Release
    strategy:
      matrix:
        target:
          - bun-linux-x64
          - bun-linux-arm64
          - bun-darwin-x64
          - bun-darwin-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - name: Build ${{ matrix.target }}
        run: |
          bun build --compile --minify --target=${{ matrix.target }} \
            src/index.ts --outfile "delta-${{ matrix.target }}"
      - uses: softprops/action-gh-release@v2
        with:
          files: delta-${{ matrix.target }}

  container:
    needs: verify
    permissions:
      contents: read
      packages: write # push the image to GitHub Container Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/carrara-labs/delta-harness
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  npm:
    needs: [verify, binaries]
    permissions:
      contents: read
      id-token: write # npm provenance attestation via OIDC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: npm install -g npm@latest # provenance needs a recent npm
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
