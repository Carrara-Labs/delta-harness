name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Use the gitleaks CLI directly (Apache-2.0, free for org repos too) rather than
      # the gitleaks-action, which requires a paid GITLEAKS_LICENSE for organizations.
      - name: Run gitleaks
        run: |
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --verbose
