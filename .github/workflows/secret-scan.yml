name: Secret scan

on:
  push:
    branches: [main]
    tags: ["v*"] # scan release tags too, so a direct tag can't bypass the gate
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Use the gitleaks CLI directly (Apache-2.0, free for org repos too) rather than
      # the gitleaks-action, which requires a paid GITLEAKS_LICENSE for organizations.
      # Verify the download against the release's published checksums before running.
      - name: Run gitleaks
        run: |
          VER=8.21.2
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${VER}"
          curl -sSfL "${BASE}/gitleaks_${VER}_linux_x64.tar.gz" -o gitleaks.tar.gz
          curl -sSfL "${BASE}/gitleaks_${VER}_checksums.txt" -o checksums.txt
          grep "gitleaks_${VER}_linux_x64.tar.gz" checksums.txt | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --redact --no-banner --verbose
